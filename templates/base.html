<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, sans-serif; background: #f4f4f4; }
.container { max-width: 600px; margin: 0 auto; background: #ffffff; }
.header { background: #2c3e50; color: #ffffff; padding: 30px; text-align: center; }
.header h1 { margin: 0; font-size: 24px; }
.content { padding: 30px; line-height: 1.6; color: #333333; }
.footer { background: #f8f9fa; padding: 20px; text-align: center; font-size: 12px; color: #999999; }
.button { display: inline-block; padding: 12px 30px; background: #3498db; color: #ffffff; text-decoration: none; border-radius: 4px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>{{title}}</h1>
  </div>
  <div class="content">
    {{content}}
  </div>
  <div class="footer">
    <p>您收到此邮件是因为您订阅了我们的服务。</p>
    <p><a href="{{unsubscribe_url}}" style="color:#999;">退订 / Unsubscribe</a></p>
  </div>
</div>
</body>
</html>
