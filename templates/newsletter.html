<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, sans-serif; background: #f0f0f0; }
.container { max-width: 600px; margin: 0 auto; background: #ffffff; }
.header { background: linear-gradient(135deg, #667eea, #764ba2); color: #ffffff; padding: 40px 30px; text-align: center; }
.header h1 { margin: 0 0 10px; font-size: 28px; }
.header p { margin: 0; opacity: 0.9; }
.content { padding: 30px; }
.greeting { font-size: 18px; color: #333; margin-bottom: 20px; }
.article { border-bottom: 1px solid #eee; padding: 20px 0; }
.article h2 { color: #333; font-size: 18px; margin: 0 0 10px; }
.article p { color: #666; line-height: 1.6; }
.cta { text-align: center; padding: 30px; }
.button { display: inline-block; padding: 14px 36px; background: #667eea; color: #ffffff; text-decoration: none; border-radius: 6px; font-size: 16px; }
.footer { background: #f8f9fa; padding: 20px 30px; text-align: center; font-size: 12px; color: #999; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>{{newsletter_title}}</h1>
    <p>{{date}}</p>
  </div>
  <div class="content">
    <p class="greeting">Hi {{name}}，</p>
    <p>{{intro}}</p>

    <div class="article">
      <h2>{{article1_title}}</h2>
      <p>{{article1_summary}}</p>
    </div>

    <div class="article">
      <h2>{{article2_title}}</h2>
      <p>{{article2_summary}}</p>
    </div>

    <div class="cta">
      <a href="{{cta_url}}" class="button">{{cta_text}}</a>
    </div>
  </div>
  <div class="footer">
    <p>{{company}} | {{address}}</p>
    <p><a href="{{unsubscribe_url}}" style="color:#999;">退订 / Unsubscribe</a></p>
  </div>
</div>
</body>
</html>
